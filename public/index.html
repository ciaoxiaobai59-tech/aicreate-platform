<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AICreate - AI创作平台</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo" onclick="router.navigate('home')">
                <i class="fas fa-magic"></i>
                <span>AICreate</span>
            </a>
            <div class="nav-links">
                <a href="#" class="nav-link active" onclick="router.navigate('home')">首页</a>
                <a href="#" class="nav-link" onclick="router.navigate('workflows')">工作流</a>
                <a href="#" class="nav-link" onclick="router.navigate('artworks')">作品</a>
                <a href="#" class="nav-link" onclick="router.navigate('models')">模型库</a>
                <a href="#" class="nav-link" onclick="router.navigate('analytics')">数据可视化</a>
                <a href="#" class="nav-link aiqa-link" onclick="router.navigate('aiqa')">次奥小白AI助手</a>
            </div>
            <div class="nav-actions">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="搜索工作流、作品..." id="globalSearch">
                </div>
                <button class="btn btn-primary" id="createBtn" onclick="router.navigate('create')">
                    <i class="fas fa-plus"></i> 创作
                </button>
                <div class="user-menu" id="userMenu">
                    <button class="btn btn-outline" id="loginBtn" onclick="router.navigate('login')">登录</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main id="mainContent">
        <!-- 动态加载内容 -->
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-brand">
                <i class="fas fa-magic"></i>
                <span>AICreate</span>
                <p>AI驱动的内容创作平台</p>
            </div>
            <div class="footer-links">
                <a href="#">关于我们</a>
                <a href="#">使用条款</a>
                <a href="#">隐私政策</a>
                <a href="#">联系我们</a>
            </div>
            <div class="footer-social">
                <a href="#"><i class="fab fa-github"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-discord"></i></a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2024 AICreate. All rights reserved.</p>
        </div>
    </footer>

    <!-- 登录弹窗 -->
    <div class="modal" id="authModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal('authModal')">&times;</span>
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchAuthTab('login')">登录</button>
                <button class="auth-tab" onclick="switchAuthTab('register')">注册</button>
            </div>
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" name="email" required placeholder="请输入邮箱">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" required placeholder="请输入密码">
                </div>
                <button type="submit" class="btn btn-primary btn-block">登录</button>
            </form>
            <form id="registerForm" class="auth-form" style="display: none;">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" required placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" name="email" required placeholder="请输入邮箱">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" required placeholder="请输入密码">
                </div>
                <button type="submit" class="btn btn-primary btn-block">注册</button>
            </form>
        </div>
    </div>

    <!-- 设置弹窗 -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal('settingsModal')">&times;</span>
            <h2>个人设置</h2>
            <form id="settingsForm">
                <div class="form-group avatar-upload-group">
                    <label>头像</label>
                    <div class="avatar-upload-container">
                        <div class="avatar-preview" id="avatarPreview">
                            <img id="avatarImage" src="" alt="头像预览" style="display: none;">
                            <span class="avatar-placeholder">点击上传头像</span>
                        </div>
                        <input type="file" id="avatarFile" name="avatarFile" accept="image/*" style="display: none;">
                        <button type="button" class="btn btn-outline btn-block avatar-upload-btn" onclick="document.getElementById('avatarFile').click()">
                            选择图片
                        </button>
                        <input type="hidden" name="avatar" id="settingsAvatar">
                    </div>
                </div>
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" id="settingsUsername" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" name="email" id="settingsEmail" placeholder="请输入邮箱">
                </div>
                <div class="form-group">
                    <label>个人简介</label>
                    <textarea name="bio" id="settingsBio" placeholder="介绍一下你自己..." rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-block">保存设置</button>
            </form>
        </div>
    </div>

    <!-- 运行工作流弹窗 -->
    <div class="modal" id="runWorkflowModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal('runWorkflowModal')">&times;</span>
            <h2>AI图像生成</h2>
            <div id="workflowRunContent">
                <div style="padding: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">图像描述</label>
                    <textarea id="workflowPrompt" rows="4" placeholder="请输入您想要生成的图像描述，例如：一幅赛博朋克风格的城市夜景，霓虹灯闪烁，雨水反射着灯光..." style="width: 100%; padding: 12px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; resize: vertical;"></textarea>
                    <button class="btn btn-primary" style="margin-top: 20px; width: 100%;" onclick="generateImage()">
                        <i class="fas fa-magic"></i> 生成图像
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
